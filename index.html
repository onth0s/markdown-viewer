<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="description" content="Online markdown editor with live preview.">

    <script>
      (function(){
        try {
          var BOOT_THEME_KEY = 'com.markdownlivepreview_theme';
          var raw = localStorage.getItem(BOOT_THEME_KEY);
          var useDark = raw !== 'light';
          document.documentElement.setAttribute('data-theme', useDark ? 'dark' : 'light');

          var SCROLL_KEY = 'mdv_scroll_sync';
          var scrollRaw = localStorage.getItem(SCROLL_KEY);
          var syncOn = scrollRaw !== 'false';
          document.documentElement.setAttribute('data-sync', syncOn ? 'on' : 'off');

          var PREVIEW_CSS_LIGHT = 'css/github-markdown-light.css';
          var PREVIEW_CSS_DARK = 'css/github-markdown-dark_dimmed.css';
          var href = useDark ? PREVIEW_CSS_DARK : PREVIEW_CSS_LIGHT;

          var link = document.createElement('link');
          link.id = 'gh-markdown-link';
          link.rel = 'stylesheet';
          link.href = href;
          document.head.appendChild(link);
        } catch (e) {}
      })();
    </script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Markdown Viewer</title>
  </head>

  <body>
    <div id="container" class="split-container">
      <div id="edit" class="column editor-pane">
        <header>
          <div id="menu-items">
            <div><a href="/">Markdown Viewer</a></div>
            <div id="copy-button"><a href="#">Copy</a></div>
            <div id="export-button"><a href="#">Export PDF</a></div>
            <div id="sync-button">
              <span class="sync-toggle" title="Toggle sync scroll">
                <span class="sync-toggle-slider">
                  <svg class="sync-toggle-knob" width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11.31,4.37,9.17,7.5A1,1,0,0,0,9.86,9h4.28a1,1,0,0,0,.69-1.5L12.69,4.37A.82.82,0,0,0,11.31,4.37Zm1.38,15.25,2.14-3.12a1,1,0,0,0-.69-1.5H9.86a1,1,0,0,0-.69,1.5l2.14,3.12A.82.82,0,0,0,12.69,19.62Z" style="fill: none; stroke: #555; stroke-linecap: round; stroke-linejoin: round; stroke-width: 1.5;"/></svg>
                </span>
              </span>
              <span class="theme-toggle" title="Toggle dark mode">
                <span class="theme-toggle-slider">
                  <svg class="theme-toggle-knob" width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><g fill="#555" fill-rule="nonzero"><path d="M12,22 C17.5228475,22 22,17.5228475 22,12 C22,6.4771525 17.5228475,2 12,2 C6.4771525,2 2,6.4771525 2,12 C2,17.5228475 6.4771525,22 12,22 Z M12,20 L12,4 C16.418278,4 20,7.581722 20,12 C20,16.418278 16.418278,20 12,20 Z"/></g></svg>
                </span>
              </span>
            </div>
          </div>
        </header>
        <div id="editor-wrapper">
          <div id="editor-highlight"></div>
          <textarea id="editor" spellcheck="false"></textarea>
        </div>
      </div>

      <div id="split-divider" class="split-divider"></div>

      <div id="preview" class="column preview-pane">
        <div id="preview-wrapper">
          <div id="output" class="content markdown-body"></div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.4.0/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
