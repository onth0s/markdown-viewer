<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="description" content="Online markdown editor with live preview.">

    <script>
      (function(){
        try {
          var BOOT_THEME_KEY = 'com.markdownlivepreview_theme';
          var BRIGHTNESS_KEY = 'mdv_brightness';
          var raw = localStorage.getItem(BOOT_THEME_KEY);
          var brightnessRaw = localStorage.getItem(BRIGHTNESS_KEY);
          var brightness = brightnessRaw !== null ? parseInt(brightnessRaw, 10) : (raw === 'light' ? 25 : 75);
          var useDark = brightness >= 50;
          document.documentElement.setAttribute('data-theme', useDark ? 'dark' : 'light');

          var COLOR_MAP = {
            'color-primary': [47, 49, 59, 64],
            'color-primary-hover': [46, 56, 64, 69],
            'color-primary-active': [49, 42, 55, 57],
            'color-primary-subtle': [73, 96, 36, 18],
            'bg-app': [11, 97, 29, 11],
            'bg-surface': [0, 100, 31, 15],
            'bg-header': [24, 47, 32, 24],
            'bg-editor': [0, 100, 31, 15],
            'bg-preview': [0, 100, 31, 15],
            'bg-code': [67, 92, 42, 20],
            'border-default': [22, 88, 30, 25],
            'border-muted': [15, 94, 28, 20],
            'text-primary': [13, 16, 40, 93],
            'text-secondary': [9, 38, 9, 58],
            'text-tertiary': [9, 58, 11, 44],
            'text-on-primary': [0, 100, 0, 100],
            'text-link': [47, 49, 59, 64],
            'syntax-heading': [47, 49, 59, 64],
            'syntax-bold': [13, 16, 40, 93],
            'syntax-italic': [13, 16, 40, 93],
            'syntax-code': [47, 49, 59, 64],
            'syntax-fence': [8, 43, 11, 44],
            'syntax-link': [47, 49, 59, 64],
            'syntax-image': [47, 49, 80, 72],
            'syntax-quote': [8, 43, 11, 44],
            'syntax-list': [47, 49, 59, 64],
            'syntax-hr': [22, 88, 30, 25],
            'syntax-table': [13, 16, 40, 93],
            'syntax-table-sep': [22, 88, 30, 25],
            'syntax-strike': [8, 43, 11, 44],
            'selection-bg': [75, 88, 43, 29],
            'selection-text': [13, 16, 40, 93],
            'scrollbar-thumb': [13, 80, 25, 30],
            'scrollbar-thumb-hover': [8, 70, 20, 36],
            'divider': [22, 88, 30, 25],
            'divider-hover': [10, 75, 25, 30],
            'divider-active': [6, 58, 20, 36],
            'toggle-bg': [13, 80, 39, 18],
            'toggle-knob': [0, 100, 40, 93],
            'toggle-icon': [9, 38, 9, 58],
            'caret-color': [13, 16, 40, 93]
          };

          var doc = document.documentElement;
          for (var name in COLOR_MAP) {
            if (COLOR_MAP.hasOwnProperty(name)) {
              var config = COLOR_MAP[name];
              var sLight = config[0], lLight = config[1];
              var sDark = config[2], lDark = config[3];
              var sMid = (sLight + sDark) / 2;
              var lMid = 50;
              var s, l;

              if (brightness <= 25) {
                var t = brightness / 25;
                s = t * sLight;
                l = 100 - t * (100 - lLight);
              } else if (brightness <= 50) {
                var t = (brightness - 25) / 25;
                s = sLight + t * (sMid - sLight);
                l = lLight + t * (lMid - lLight);
              } else if (brightness <= 75) {
                var t = (brightness - 50) / 25;
                s = sMid + t * (sDark - sMid);
                l = lMid + t * (lDark - lMid);
              } else {
                var t = (brightness - 75) / 25;
                s = sDark - t * sDark;
                l = lDark - t * lDark;
              }
              doc.style.setProperty('--' + name + '-s', Math.round(s) + '%');
              doc.style.setProperty('--' + name + '-l', Math.round(l) + '%');
            }
          }

          var SCROLL_KEY = 'mdv_scroll_sync';
          var scrollRaw = localStorage.getItem(SCROLL_KEY);
          var syncOn = scrollRaw !== 'false';
          document.documentElement.setAttribute('data-sync', syncOn ? 'on' : 'off');

          var HUE_KEY = 'mdv_hue';
          var hueRaw = localStorage.getItem(HUE_KEY);
          document.documentElement.style.setProperty('--hue', hueRaw !== null ? hueRaw : 228);

          var SWAP_KEY = 'mdv_swapped';
          if (localStorage.getItem(SWAP_KEY) === 'true') {
            document.documentElement.setAttribute('data-swapped', '');
          }

          var PREVIEW_CSS_LIGHT = 'css/github-markdown-light.css';
          var PREVIEW_CSS_DARK = 'css/github-markdown-dark_dimmed.css';
          var href = useDark ? PREVIEW_CSS_DARK : PREVIEW_CSS_LIGHT;

          var link = document.createElement('link');
          link.id = 'gh-markdown-link';
          link.rel = 'stylesheet';
          link.href = href;
          document.head.appendChild(link);
        } catch (e) {}
      })();
    </script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Markdown Viewer</title>
  </head>

  <body>
    <div id="container" class="split-container">
      <div id="edit" class="column editor-pane">
        <header>
          <div id="menu-items">
            <div><a href="/"><img src="logo.png" alt="Markdown Viewer" class="nav-logo"></a></div>
            <div id="wrench-button" title="Settings">
              <img src="svg/wrench.svg" alt="" width="14" height="14">
              <div id="wrench-popup">
                <div class="wrench-section">
                  <label class="wrench-label" for="hue-slider">Accent hue</label>
                  <div class="hue-slider-wrap">
                    <input type="range" id="hue-slider" min="0" max="359" step="1">
                  </div>
                </div>
                <div class="wrench-section">
                  <label class="wrench-label" for="brightness-slider">Theme brightness</label>
                  <div class="brightness-slider-wrap">
                    <input type="range" id="brightness-slider" min="0" max="100" step="1">
                  </div>
                </div>
              </div>
            </div>
            <div id="copy-button" title="Copy">
              <img src="svg/copy.svg" alt="" width="20" height="20">
            </div>
            <div id="export-button" title="Export PDF">
              <img src="svg/pdf.svg" alt="" width="20" height="20">
            </div>
            <div id="download-button" title="Download Markdown">
              <img src="svg/download.svg" alt="" width="20" height="20">
            </div>
            <div id="sync-button">
              <span class="sync-toggle" title="Toggle sync scroll">
                <span class="sync-toggle-slider">
                  <svg class="sync-toggle-knob" width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11.31,4.37,9.17,7.5A1,1,0,0,0,9.86,9h4.28a1,1,0,0,0,.69-1.5L12.69,4.37A.82.82,0,0,0,11.31,4.37Zm1.38,15.25,2.14-3.12a1,1,0,0,0-.69-1.5H9.86a1,1,0,0,0-.69,1.5l2.14,3.12A.82.82,0,0,0,12.69,19.62Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
              </span>
              <span class="theme-toggle" title="Toggle dark mode">
                <span class="theme-toggle-slider">
                  <svg class="theme-toggle-knob" width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12,22 C17.5228475,22 22,17.5228475 22,12 C22,6.4771525 17.5228475,2 12,2 C6.4771525,2 2,6.4771525 2,12 C2,17.5228475 6.4771525,22 12,22 Z M12,20 L12,4 C16.418278,4 20,7.581722 20,12 C20,16.418278 16.418278,20 12,20 Z" fill="currentColor"/></svg>
                </span>
              </span>
            </div>
            <div id="swap-button" title="Swap panes">
              <img src="svg/arrows-horizontal.svg" alt="" width="16" height="16">
            </div>
          </div>
        </header>
        <div id="editor-wrapper">
          <div id="editor-highlight"></div>
          <textarea id="editor" spellcheck="false"></textarea>
          <div id="custom-scrollbar">
            <div id="custom-scrollbar-thumb"></div>
            <div id="caret-indicator"></div>
          </div>
          <div id="editor-scroll-overlay" class="scroll-popup-overlay">
            <div class="scroll-popup-btn scroll-popup-top" data-dir="top">&#9650;</div>
            <div class="scroll-popup-btn scroll-popup-bottom" data-dir="bottom">&#9660;</div>
          </div>
        </div>
      </div>

      <div id="split-divider" class="split-divider"></div>

      <div id="preview" class="column preview-pane">
        <div id="preview-wrapper">
          <div id="output" class="content markdown-body"></div>
        </div>
        <div id="preview-custom-scrollbar">
          <div class="scrollbar-arrow scrollbar-arrow-up" data-dir="up">&#9650;</div>
          <div id="preview-custom-scrollbar-thumb"></div>
          <div class="scrollbar-arrow scrollbar-arrow-down" data-dir="down">&#9660;</div>
        </div>
        <div id="preview-scroll-overlay" class="scroll-popup-overlay">
          <div class="scroll-popup-btn scroll-popup-top" data-dir="top">&#9650;</div>
          <div class="scroll-popup-btn scroll-popup-bottom" data-dir="bottom">&#9660;</div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.4.0/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
