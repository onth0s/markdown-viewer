<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="description" content="Online markdown editor with live preview.">

    <script>
      (function(){
        try {
          var BOOT_THEME_KEY = 'com.markdownlivepreview_theme';
          var raw = localStorage.getItem(BOOT_THEME_KEY);
          var useDark = raw !== 'light';
          document.documentElement.setAttribute('data-theme', useDark ? 'dark' : 'light');

          var SCROLL_KEY = 'mdv_scroll_sync';
          var scrollRaw = localStorage.getItem(SCROLL_KEY);
          var syncOn = scrollRaw !== 'false';
          document.documentElement.setAttribute('data-sync', syncOn ? 'on' : 'off');

          var SWAP_KEY = 'mdv_swapped';
          if (localStorage.getItem(SWAP_KEY) === 'true') {
            document.documentElement.setAttribute('data-swapped', '');
          }

          var PREVIEW_CSS_LIGHT = 'css/github-markdown-light.css';
          var PREVIEW_CSS_DARK = 'css/github-markdown-dark_dimmed.css';
          var href = useDark ? PREVIEW_CSS_DARK : PREVIEW_CSS_LIGHT;

          var link = document.createElement('link');
          link.id = 'gh-markdown-link';
          link.rel = 'stylesheet';
          link.href = href;
          document.head.appendChild(link);
        } catch (e) {}
      })();
    </script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Markdown Viewer</title>

      <div id="split-divider" class="split-divider"></div>

      <div id="preview" class="column preview-pane">

      </div>
